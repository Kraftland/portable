name: Build and Test

on:
  release:
    types: released
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Rust
      run: sudo apt-get install cargo -y

    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'lib/daemon/go.mod'
    - name: Install Dependencies
      run: sudo apt update && sudo apt install -y libnotify4 libudev-dev zenity xdg-dbus-proxy systemd dbus grep xdg-desktop-portal xdg-desktop-portal-gtk bubblewrap libseccomp-dev libsystemd-dev

    - name: Build
      run: bash lib/build.sh

    - name: Install Portable
      run: sudo bash lib/package.sh

    - name: Test
      run: go test -v ./...
      working-directory: 'lib/open-ng'
    - name: Test
      run: go test -v ./...
      working-directory: 'lib/flatpak-spawn-stub'
    - name: Test
      run: go test -v ./...
      working-directory: 'lib/prlimit-stub'
