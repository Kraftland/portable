# This workflow will build a golang project
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-go

name: Build and Test on PR and Release

on:
  release:
    types: released
  pull_request:
    branches: [ "master" ]

jobs:

  build:
    runs-on: ubuntu-latest
    container:
      image: jrei/systemd-ubuntu:26.04
        
    steps:
    - uses: actions/checkout@v4
    - name: Update apt
      run: apt update
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version-file: 'lib/daemon/go.mod'
    - name: Install Dependencies
      run: apt install -y build-essential libnotify4 libudev-dev zenity xdg-dbus-proxy systemd dbus grep xdg-desktop-portal xdg-desktop-portal-gtk bubblewrap

    - name: Build Daemon
      run: bash lib/build.sh

    - name: Install Portable
      run: bash lib/package.sh

    - name: Install Compositor
      run: apt install -y weston

    - name: Start Compositor and test
      run: |
          export XDG_RUNTIME_DIR="/tmp/portable_runtime_dir"
          mkdir /tmp/portable_runtime_dir
          #docker exec builder mkdir "/tmp/portable_runtime_dir"
          #docker exec builder chmod 0700 "$XDG_RUNTIME_DIR"
          echo "$XDG_RUNTIME_DIR" > $GITHUB_WORKSPACE/.xdg_runtime_dir
          weston -B headless --socket=wayland-0 &
          sleep 5s
          cd lib/daemon
          go test -v

    - name: Test helper
      run: |
          export XDG_RUNTIME_DIR="$(cat $GITHUB_WORKSPACE/.xdg_runtime_dir)"
          go test -v ./...
      working-directory: 'lib/helper'
    - name: Test open
      run: |
          export XDG_RUNTIME_DIR="$(cat $GITHUB_WORKSPACE/.xdg_runtime_dir)"
          go test -v ./...
      working-directory: 'lib/open-ng'
    - name: Test flatpak-spawn
      run: |
          export XDG_RUNTIME_DIR="$(cat $GITHUB_WORKSPACE/.xdg_runtime_dir)"
          go test -v ./...
      working-directory: 'lib/flatpak-spawn-stub'
    - name: Test prlimit
      run: |
          export XDG_RUNTIME_DIR="$(cat $GITHUB_WORKSPACE/.xdg_runtime_dir)"
          go test -v ./...
      working-directory: 'lib/prlimit-stub'
